<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f0f11;
            --surface-color: #1c1c1f;
            --text-main: #f0f0f0;
            --text-muted: #888891;
            --accent: #5e81ac;
            --accent-glow: rgba(94, 129, 172, 0.3);
            --bouncy-ease: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: #000;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
        }

        #app {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Search Header */
        .search-header {
            padding: 16px;
            background: var(--bg-color);
            z-index: 10;
            padding-bottom: 0;
        }

        .search-bar-container {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border-radius: 24px;
            padding: 4px 16px;
            transition: all 0.3s var(--bouncy-ease);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar-container:focus-within {
            transform: scale(1.02);
            box-shadow: 0 4px 20px var(--accent-glow);
            border-color: var(--accent);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 8px;
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 12px 16px 0;
            gap: 20px;
            position: relative;
        }

        .tab {
            color: var(--text-muted);
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
        }

        .tab.active { color: white; }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            height: 3px;
            background: var(--accent);
            border-radius: 3px 3px 0 0;
            transition: transform 0.4s var(--bouncy-ease), width 0.4s var(--bouncy-ease);
        }

        /* Results Container */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            will-change: transform;
            transform-origin: top;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Hiding scrollbar */
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }

        /* Result Cards */
        .result-card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: bounceIn 0.5s var(--bouncy-ease) forwards;
            border: 1px solid rgba(255,255,255,0.03);
            will-change: transform, opacity;
        }

        .result-card:active {
            transform: scale(0.98) !important;
            transition: transform 0.1s;
        }

        @keyframes bounceIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .domain-tag {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .domain-icon {
            width: 16px; height: 16px;
            background: #2a2a2f;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 10px;
        }

        .result-title {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            text-decoration: none;
            display: block;
        }

        .result-title:visited { color: #8e62c7; }

        .result-desc {
            font-size: 14px;
            color: #b0b0b5;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .thumbnail-container {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2a2f;
            aspect-ratio: 16/9;
            position: relative;
        }

        .thumbnail-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .video-duration {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            color: white; font-size: 11px;
            padding: 2px 6px; border-radius: 4px;
            font-weight: bold;
        }

        .play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }

        .play-btn svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

        /* Grid for Images Tab */
        .images-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .image-card {
            background: var(--surface-color);
            border-radius: 12px; overflow: hidden;
            opacity: 0;
            animation: bounceIn 0.5s var(--bouncy-ease) forwards;
        }
        .image-card .thumbnail-container { margin-top: 0; border-radius: 0; }
        .image-card .domain-tag { padding: 8px; margin: 0; font-size: 10px; }

        .no-results {
            text-align: center; color: var(--text-muted);
            margin-top: 40px; font-size: 16px;
        }

        /* Generate SVG Backgrounds internally for demo */
        .bg-wwe { background: linear-gradient(135deg, #111, #400); }
        .bg-yt { background: linear-gradient(135deg, #411, #200); }
        .bg-gh { background: linear-gradient(135deg, #121, #012); }
    </style>
<script src="https://cdn.jsdelivr.net/npm/meilisearch@0.39.0/dist/bundles/meilisearch.umd.js"></script>
</head>
<body>

<div id="app">
    <div class="search-header">
        <div class="search-bar-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search..." autocomplete="off">
            <button id="clearBtn" style="display:none; padding: 4px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="tabs">
            <div class="tab active" data-tab="all" onclick="switchTab('all', this)">All</div>
            <div class="tab" data-tab="images" onclick="switchTab('images', this)">Images</div>
            <div class="tab" data-tab="videos" onclick="switchTab('videos', this)">Videos</div>
            <div class="tab-indicator" id="tabIndicator"></div>
        </div>
    </div>

    <div class="scroll-container" id="scrollContainer">
        <div id="resultsContainer"></div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION & LIVE INDEX ---

    let secureIndex = [];

    async function loadIndex() {
        try {
            const client = new meilisearch.MeiliSearch({
                host: 'https://meilisearch-production-7a96.up.railway.app',
                apiKey: 'strongpassword123'
            });

            const index = client.index('movies');

            let query = currentQuery || '';

            const res = await index.search(query, {
                limit: 1000
            });

            secureIndex = res.hits || [];
            renderResults();

        } catch (e) {
            console.error(e);

            document.getElementById('resultsContainer').innerHTML =
                `<div class="no-results">
                    ⚠️ Meilisearch Error
                    <br>
                    <small style="font-size:12px;opacity:0.6">${e.message}</small>
                </div>`;
        }    }

    // --- 2. STATE MANAGEMENT ---
    let currentTab = 'all';
    let currentQuery = '';

    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const tabIndicator = document.getElementById('tabIndicator');

    // --- 3. UI LOGIC & ANIMATIONS ---

    function initTabIndicator() {
        const activeTab = document.querySelector('.tab.active');
        updateTabIndicator(activeTab);
    }

    function updateTabIndicator(element) {
        tabIndicator.style.width = `${element.offsetWidth}px`;
        tabIndicator.style.transform = `translateX(${element.offsetLeft - 16}px)`; // -16 for padding
    }

    window.switchTab = function(tabName, element) {
        if(currentTab === tabName) return;
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        updateTabIndicator(element);
        
        currentTab = tabName;
        renderResults();
    };

    input.addEventListener('input', async (e) => {
        currentQuery = e.target.value.trim().toLowerCase();
        clearBtn.style.display = currentQuery.length > 0 ? 'block' : 'none';
        await loadIndex();
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        currentQuery = '';
        clearBtn.style.display = 'none';
        input.focus();
        renderResults();
    });

    // --- 4. SEARCH ENGINE LOGIC ---

    function renderResults() {
        resultsContainer.innerHTML = '';
        
        // 1. Filter by Query
        let results = secureIndex;
        if (currentQuery) {
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.title.toLowerCase().includes(currentQuery) || 
                       n.desc.toLowerCase().includes(currentQuery) ||
                       n.domain.toLowerCase().includes(currentQuery);
            });
        }

        // 2. Filter by Tab
        if (currentTab === 'images') {
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.type === 'image' || (n.thumb && n.type !== 'video');
            });
        } else if (currentTab === 'videos') {
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.type === 'video';
            });
        }

        // 3. Render
        if (results.length === 0) {
            resultsContainer.innerHTML = `<div class="no-results">No results found${currentQuery ? ` for "${currentQuery}"` : ''}</div>`;
            return;
        }

        if (currentTab === 'images') {
            renderImagesGrid(results);
        } else {
            renderList(results);
        }
    }

    function normalizeItem(item) {
        // Handle different field names crawler might output
        return {
            title: item.title || item.name || "Untitled",
            desc: item.desc || item.description || item.snippet || "",
            url: item.url || item.link || "#",
            domain: item.domain || item.source || (item.url ? new URL(item.url).hostname.replace("www.","") : "unknown"),
            type: item.type || (item.duration ? "video" : (item.thumb || item.thumbnail ? "image" : "page")),
            thumb: item.thumb || item.thumbnail || item.image || null,
            duration: item.duration || null
        };
    }

    function renderList(results) {
        let delay = 0;
        results.forEach((raw) => {
            const item = normalizeItem(raw);
            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.animationDelay = `${delay}s`;
            delay += 0.05;

            const domainInitial = item.domain.charAt(0).toUpperCase();

            let mediaHTML = '';
            if (item.type === 'video' && item.thumb) {
                mediaHTML = `
                    <div class="thumbnail-container">
                        <img src="${item.thumb}" loading="lazy" onerror="this.style.display='none'" alt="Thumbnail">
                        <div class="play-btn">
                            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </div>
                        ${item.duration ? `<div class="video-duration">${item.duration}</div>` : ''}
                    </div>
                `;
            } else if (item.thumb) {
                mediaHTML = `
                    <div class="thumbnail-container">
                        <img src="${item.thumb}" loading="lazy" onerror="this.style.display='none'" alt="Thumbnail">
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="domain-tag">
                    <span class="domain-icon">${domainInitial}</span>
                    ${item.domain}
                </div>
                <a href="${item.url}" target="_blank" class="result-title">${item.title}</a>
                <div class="result-desc">${item.desc}</div>
                ${mediaHTML}
            `;
            resultsContainer.appendChild(card);
        });
    }

    function renderImagesGrid(results) {
        const grid = document.createElement('div');
        grid.className = 'images-grid';
        let delay = 0;

        results.forEach(raw => {
            const item = normalizeItem(raw);
            const card = document.createElement('div');
            card.className = 'image-card';
            card.style.animationDelay = `${delay}s`;
            delay += 0.05;
            
            const domainInitial = item.domain.charAt(0).toUpperCase();

            card.innerHTML = `
                <div class="thumbnail-container" style="aspect-ratio: 1/1;">
                    <img src="${item.thumb}" loading="lazy" onerror="this.style.display='none'" alt="Thumbnail" style="height: 100%;">
                </div>
                <div class="domain-tag">
                    <span class="domain-icon" style="width:12px;height:12px;font-size:8px;">${domainInitial}</span>
                    ${item.domain}
                </div>
            `;
            grid.appendChild(card);
        });
        resultsContainer.appendChild(grid);
    }

    // --- 5. RUBBER BAND STRETCHING ANIMATION LOGIC ---
    const scrollElem = document.getElementById('scrollContainer');
    let startY = 0;
    let currentY = 0;
    let isDragging = false;

    scrollElem.addEventListener('touchstart', (e) => {
        if(scrollElem.scrollTop === 0) {
            startY = e.touches[0].clientY;
            isDragging = true;
            scrollElem.style.transition = 'none';
        }
    }, {passive: true});

    scrollElem.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        currentY = e.touches[0].clientY;
        const diff = currentY - startY;
        
        // Only stretch if pulling down at the very top
        if (diff > 0 && scrollElem.scrollTop === 0) {
            // Logarithmic damping for rubber band feel
            const resistance = 0.4;
            const stretch = Math.pow(diff * resistance, 0.8);
            scrollElem.style.transform = `translateY(${stretch}px)`;
        }
    }, {passive: true});

    scrollElem.addEventListener('touchend', () => {
        if(!isDragging) return;
        isDragging = false;
        // Snap back with bouncy easing
        scrollElem.style.transition = 'transform 0.4s var(--bouncy-ease)';
        scrollElem.style.transform = 'translateY(0)';
    });

    // Initialize
    window.addEventListener('load', () => {
        initTabIndicator();
        loadIndex();
        input.focus();
    });
</script>

</body>
</html>
