<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f0f11;
            --surface-color: #1c1c1f;
            --text-main: #f0f0f0;
            --text-muted: #888891;
            --accent: #5e81ac;
            --accent-glow: rgba(94, 129, 172, 0.3);
            --bouncy-ease: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: #000;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
        }

        #app {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .search-header {
            padding: 16px;
            background: var(--bg-color);
            z-index: 10;
            padding-bottom: 0;
        }

        .search-bar-container {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border-radius: 24px;
            padding: 4px 16px;
            transition: all 0.3s var(--bouncy-ease);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar-container:focus-within {
            transform: scale(1.02);
            box-shadow: 0 4px 20px var(--accent-glow);
            border-color: var(--accent);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 8px;
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .tabs {
            display: flex;
            padding: 12px 16px 0;
            gap: 20px;
            position: relative;
        }

        .tab {
            color: var(--text-muted);
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
        }

        .tab.active { color: white; }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            height: 3px;
            background: var(--accent);
            border-radius: 3px 3px 0 0;
            transition: transform 0.4s var(--bouncy-ease), width 0.4s var(--bouncy-ease);
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            will-change: transform;
            transform-origin: top;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }

        .result-card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: bounceIn 0.5s var(--bouncy-ease) forwards;
            border: 1px solid rgba(255,255,255,0.03);
            will-change: transform, opacity;
        }

        .result-card:active {
            transform: scale(0.98) !important;
            transition: transform 0.1s;
        }

        @keyframes bounceIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .domain-tag {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .domain-icon {
            width: 16px; height: 16px;
            background: #2a2a2f;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 10px;
        }

        .result-title {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            text-decoration: none;
            display: block;
        }

        .result-title:visited { color: #8e62c7; }

        .result-desc {
            font-size: 14px;
            color: #b0b0b5;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .thumbnail-container {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2a2f;
            aspect-ratio: 16/9;
            position: relative;
        }

        .thumbnail-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .video-duration {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            color: white; font-size: 11px;
            padding: 2px 6px; border-radius: 4px;
            font-weight: bold;
        }

        .play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }

        .play-btn svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

        .images-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .image-card {
            background: var(--surface-color);
            border-radius: 12px; overflow: hidden;
            opacity: 0;
            animation: bounceIn 0.5s var(--bouncy-ease) forwards;
        }
        .image-card .thumbnail-container { margin-top: 0; border-radius: 0; }
        .image-card .domain-tag { padding: 8px; margin: 0; font-size: 10px; }

        .no-results {
            text-align: center; color: var(--text-muted);
            margin-top: 40px; font-size: 16px;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99px;
            margin-left: auto;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .status-live { background: rgba(94,172,94,0.15); color: #5eac5e; }
        .status-local { background: rgba(172,140,94,0.15); color: #ac8c5e; }
        .status-loading { background: rgba(94,129,172,0.15); color: #5e81ac; }
    </style>
</head>
<body>

<div id="app">
    <div class="search-header">
        <div class="search-bar-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search..." autocomplete="off">
            <button id="clearBtn" style="display:none; padding: 4px; background:none; border:none; cursor:pointer;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <span id="statusBadge" class="status-badge status-loading">...</span>
        </div>
        <div class="tabs">
            <div class="tab active" data-tab="all" onclick="switchTab('all', this)">All</div>
            <div class="tab" data-tab="images" onclick="switchTab('images', this)">Images</div>
            <div class="tab" data-tab="videos" onclick="switchTab('videos', this)">Videos</div>
            <div class="tab-indicator" id="tabIndicator"></div>
        </div>
    </div>

    <div class="scroll-container" id="scrollContainer">
        <div id="resultsContainer"></div>
    </div>
</div>

<script>
    // ─── CONFIG ───────────────────────────────────────────────
    const MEILI_HOST = 'https://meilisearch-production-7a96.up.railway.app';
    const MEILI_KEY  = 'strongpassword123';
    const MEILI_INDEX = 'movies';
    const INDEX_JSON  = './index.json';
    // ──────────────────────────────────────────────────────────

    let secureIndex = [];
    let dataSource  = 'none'; // 'meili' | 'local'
    let isSearching = false;
    let searchTimer = null;

    // ─── STATE ────────────────────────────────────────────────
    let currentTab   = 'all';
    let currentQuery = '';

    const input            = document.getElementById('searchInput');
    const clearBtn         = document.getElementById('clearBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const tabIndicator     = document.getElementById('tabIndicator');
    const statusBadge      = document.getElementById('statusBadge');

    // ─── MEILISEARCH: raw fetch (no SDK) ─────────────────────
    // The SDK sometimes sends X-Meili-API-Key header which some
    // proxies reject. Use raw fetch with Bearer directly.
    async function meiliSearch(query) {
        const url = `${MEILI_HOST}/indexes/${MEILI_INDEX}/search`;
        const resp = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${MEILI_KEY}`
            },
            body: JSON.stringify({
                q: query || '',
                limit: 500
            })
        });
        if (!resp.ok) throw new Error(`Meili HTTP ${resp.status}`);
        const data = await resp.json();
        if (data.message) throw new Error(data.message);
        return data.hits || [];
    }

    // ─── LOCAL JSON FALLBACK ──────────────────────────────────
    async function loadLocalIndex() {
        const resp = await fetch(INDEX_JSON);
        if (!resp.ok) throw new Error('index.json not found');
        return await resp.json();
    }

    // ─── LOAD + SEARCH ────────────────────────────────────────
    async function loadIndex() {
        if (isSearching) return;
        isSearching = true;
        setStatus('loading');

        try {
            // Try Meilisearch first (direct fetch with Bearer)
            const hits = await meiliSearch(currentQuery);
            secureIndex = hits;
            dataSource  = 'meili';
            setStatus('live');
        } catch (meiliErr) {
            console.warn('Meilisearch failed:', meiliErr.message, '— falling back to index.json');
            try {
                const localData = await loadLocalIndex();
                secureIndex = localData;
                dataSource  = 'local';
                setStatus('local');
            } catch (localErr) {
                console.error('Local fallback also failed:', localErr.message);
                secureIndex = [];
                setStatus('local');
                resultsContainer.innerHTML = `<div class="no-results">⚠️ Could not load data<br><small style="font-size:11px;opacity:0.5">${meiliErr.message}</small></div>`;
                isSearching = false;
                return;
            }
        }

        isSearching = false;
        renderResults();
    }

    function setStatus(state) {
        statusBadge.className = 'status-badge';
        if (state === 'live')    { statusBadge.classList.add('status-live');    statusBadge.textContent = '● Live'; }
        else if (state === 'local') { statusBadge.classList.add('status-local'); statusBadge.textContent = '● Local'; }
        else                     { statusBadge.classList.add('status-loading'); statusBadge.textContent = '...'; }
    }

    // ─── TAB LOGIC ────────────────────────────────────────────
    function initTabIndicator() {
        const activeTab = document.querySelector('.tab.active');
        updateTabIndicator(activeTab);
    }

    function updateTabIndicator(element) {
        tabIndicator.style.width     = `${element.offsetWidth}px`;
        tabIndicator.style.transform = `translateX(${element.offsetLeft - 16}px)`;
    }

    window.switchTab = function(tabName, element) {
        if (currentTab === tabName) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        updateTabIndicator(element);
        currentTab = tabName;
        renderResults();
    };

    // ─── INPUT HANDLER ────────────────────────────────────────
    input.addEventListener('input', (e) => {
        currentQuery = e.target.value.trim().toLowerCase();
        clearBtn.style.display = currentQuery.length > 0 ? 'block' : 'none';

        // If using local data: filter instantly, no fetch needed
        if (dataSource === 'local') {
            renderResults();
            return;
        }

        // For Meilisearch: debounce 300ms
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadIndex(), 300);
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        currentQuery = '';
        clearBtn.style.display = 'none';
        input.focus();
        renderResults();
    });

    // ─── NORMALIZE ────────────────────────────────────────────
    function stripHtml(str) {
        if (!str) return '';
        // Remove HTML tags
        let s = str.replace(/<[^>]*>/g, '');
        // Split by newlines, filter empty/whitespace lines, take the last meaningful chunk
        // This handles tokyomotion "HD\n\n\n02:56\n\n\nActual Title" pattern
        const lines = s.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) return '';
        // The real title is usually the last non-empty line
        // But also extract duration if present (e.g. "02:56")
        const durationLine = lines.find(l => /^\d{1,2}:\d{2}$/.test(l));
        const titleLine = lines[lines.length - 1];
        return titleLine || lines[0];
    }

    function extractDuration(str) {
        if (!str) return null;
        const match = str.match(/\b(\d{1,2}:\d{2})\b/);
        return match ? match[1] : null;
    }

    function extractThumb(item) {
        // Priority: real URL > extract from img tag in title/desc > null
        let thumb = item.thumb || item.thumbnail || item.image || null;

        // Skip empty SVG placeholders from crawler
        if (thumb && (thumb.startsWith('data:image/svg') || thumb === '')) {
            thumb = null;
        }

        // Try to extract real image URL from title/desc HTML
        if (!thumb) {
            const srcMatch = (item.title || item.desc || '').match(/src=["']([^"']+)["']/);
            if (srcMatch && !srcMatch[1].startsWith('data:')) {
                thumb = srcMatch[1];
            }
        }

        return thumb;
    }

    function normalizeItem(item) {
        const rawTitle = item.title || item.name || 'Untitled';
        const rawDesc  = item.desc  || item.description || item.snippet || '';
        const thumb    = extractThumb(item);
        const duration = item.duration || extractDuration(rawTitle) || null;

        return {
            title:    stripHtml(rawTitle),
            desc:     stripHtml(rawDesc),
            url:      item.url || item.link || '#',
            domain:   item.domain || item.source || (item.url ? (() => { try { return new URL(item.url).hostname.replace('www.',''); } catch(e) { return 'unknown'; } })() : 'unknown'),
            type:     item.type || (duration || thumb ? 'video' : 'page'),
            thumb:    thumb,
            duration: duration
        };
    }

    // ─── RENDER ───────────────────────────────────────────────
    function renderResults() {
        resultsContainer.innerHTML = '';

        let results = secureIndex;

        // Filter by query (only needed for local data; Meili already filtered)
        if (currentQuery && dataSource === 'local') {
            const q = currentQuery.toLowerCase();
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.title.toLowerCase().includes(q) ||
                       n.desc.toLowerCase().includes(q)  ||
                       n.domain.toLowerCase().includes(q);
            });
        }

        // Filter by tab
        if (currentTab === 'images') {
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.type === 'image' || (n.thumb && n.type !== 'video');
            });
        } else if (currentTab === 'videos') {
            results = results.filter(item => {
                const n = normalizeItem(item);
                return n.type === 'video';
            });
        }

        if (results.length === 0) {
            resultsContainer.innerHTML = `<div class="no-results">No results found${currentQuery ? ` for "<b>${currentQuery}</b>"` : ''}</div>`;
            return;
        }

        if (currentTab === 'images') {
            renderImagesGrid(results);
        } else {
            renderList(results);
        }
    }

    function renderList(results) {
        let delay = 0;
        results.forEach((raw) => {
            const item = normalizeItem(raw);
            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.animationDelay = `${delay}s`;
            delay = Math.min(delay + 0.05, 0.5); // cap delay so large lists don't lag

            const domainInitial = item.domain.charAt(0).toUpperCase();

            let mediaHTML = '';
            if (item.thumb) {
                const isVideo = item.type === 'video';
                mediaHTML = `
                    <div class="thumbnail-container">
                        <img src="${item.thumb}" loading="lazy" onerror="this.parentElement.style.display='none'" alt="">
                        ${isVideo ? `<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>` : ''}
                        ${item.duration ? `<div class="video-duration">${item.duration}</div>` : ''}
                    </div>`;
            }

            card.innerHTML = `
                <div class="domain-tag">
                    <span class="domain-icon">${domainInitial}</span>
                    ${item.domain}
                </div>
                <a href="${item.url}" target="_blank" class="result-title">${item.title}</a>
                ${item.desc ? `<div class="result-desc">${item.desc}</div>` : ''}
                ${mediaHTML}`;

            resultsContainer.appendChild(card);
        });
    }

    function renderImagesGrid(results) {
        const grid = document.createElement('div');
        grid.className = 'images-grid';
        let delay = 0;

        results.forEach(raw => {
            const item = normalizeItem(raw);
            if (!item.thumb) return; // skip image cards with no thumb
            const card = document.createElem
