name: crawler

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - run: npm install cheerio node-fetch

    - run: node crawler.js

    - name: Commit index
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add index.json
        git commit -m "update index" || exit 0
        git push
